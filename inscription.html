{% extends "base.html" %}
{% block titre %}Inscription — Wend'Kugri{% endblock %}

{% block contenu %}
<div class="max-w-md mx-auto">
  <div class="text-center mb-6">
    <span class="inline-flex w-14 h-14 rounded-full bg-vert-fonce items-center justify-center text-or font-titre font-semibold text-2xl mb-3">W</span>
    <h1 class="font-titre text-2xl text-vert-fonce">Rejoindre Wend'Kugri</h1>
    <p class="text-sm text-grisbf mt-1">« Le Lieu de la Connaissance » — que du savoir, sans le désordre.</p>
  </div>

  <form method="post" class="space-y-3 bg-carte border border-bordurebf rounded-2xl p-5">
    <div>
      <label class="text-xs font-medium text-grisbf">Nom complet</label>
      <input type="text" name="nom" required value="{{ form.get('nom','') }}"
             class="w-full mt-1 rounded-xl border border-bordurebf px-3 py-2.5 text-sm" placeholder="Ex : Aïcha Sawadogo">
    </div>
    <div>
      <label class="text-xs font-medium text-grisbf">Email</label>
      <input type="email" name="email" required value="{{ form.get('email','') }}"
             class="w-full mt-1 rounded-xl border border-bordurebf px-3 py-2.5 text-sm" placeholder="vous@exemple.com">
    </div>
    <div>
      <label class="text-xs font-medium text-grisbf">Téléphone (Burkina Faso)</label>
      <input type="tel" name="telephone" required value="{{ form.get('telephone','') }}"
             class="w-full mt-1 rounded-xl border border-bordurebf px-3 py-2.5 text-sm font-donnee" placeholder="70 12 34 56">
    </div>
    <div>
      <label class="text-xs font-medium text-grisbf">Mot de passe</label>
      <input type="password" name="mot_de_passe" required minlength="6"
             class="w-full mt-1 rounded-xl border border-bordurebf px-3 py-2.5 text-sm" placeholder="6 caractères minimum">
    </div>

    <div class="grid grid-cols-2 gap-2">
      <div>
        <label class="text-xs font-medium text-grisbf">Domaine d'expertise</label>
        <select name="domaine_expertise" required class="w-full mt-1 rounded-xl border border-bordurebf px-3 py-2.5 text-sm">
          <option value="">Choisir…</option>
          {% for d in DOMAINES %}<option value="{{ d }}" {{ 'selected' if form.get('domaine_expertise')==d }}>{{ d }}</option>{% endfor %}
        </select>
      </div>
      <div>
        <label class="text-xs font-medium text-grisbf">Ville</label>
        <select name="ville" required class="w-full mt-1 rounded-xl border border-bordurebf px-3 py-2.5 text-sm">
          <option value="">Choisir…</option>
          {% for v in VILLES_BF %}<option value="{{ v }}" {{ 'selected' if form.get('ville')==v }}>{{ v }}</option>{% endfor %}
        </select>
      </div>
    </div>

    <div>
      <label class="text-xs font-medium text-grisbf">Niveau</label>
      <select name="niveau" class="w-full mt-1 rounded-xl border border-bordurebf px-3 py-2.5 text-sm">
        {% for n in NIVEAUX %}<option value="{{ n }}" {{ 'selected' if form.get('niveau')==n }}>{{ n }}</option>{% endfor %}
      </select>
    </div>

    <button type="submit" class="w-full bg-vert text-white rounded-xl py-3 text-sm font-semibold mt-2">Créer mon compte</button>
  </form>

  <p class="text-center text-sm text-grisbf mt-4">
    Déjà membre ? <a href="{{ url_for('connexion') }}" class="text-vert-fonce font-medium">Se connecter</a>
  </p>
</div>
{% endblock %}
